version: 2.1
orbs:
  hmpps: ministryofjustice/hmpps@11
  browser-tools: circleci/browser-tools@1.4.8
parameters:
  releases-slack-channel:
    type: string
    default: the_elephants_devs
  node-version:
    type: string
    default: 24.14-browsers
executors:
  integration-tests:
    docker:
      - image: cimg/node:<< pipeline.parameters.node-version >>
      - image: cimg/postgres:15.12
        environment:
          POSTGRES_USER: licences
          POSTGRES_DB: licences
          POSTGRES_PASSWORD: licences
      - image: ghcr.io/ministryofjustice/hmpps-auth:2026-03-02.422.c36796f
        name: hmpps-auth
        environment:
          SPRING_PROFILES_ACTIVE: dev,nomis
          SERVER_PORT: 9090
          NOMIS_ENDPOINT_URL: http://nomis-user-roles-api:9190
      - image: ghcr.io/ministryofjustice/nomis-user-roles-api:2025-11-25.29.b39ec25
        name: nomis-user-roles-api
        environment:
          SPRING_PROFILES_ACTIVE: dev
          SERVER_PORT: 9190
          API_BASE_URL_OAUTH: http://hmpps-auth:9090/auth
      - image: cimg/redis:5.0
        environment: ALLOW_EMPTY_PASSWORD=yes
    working_directory: ~/app
jobs:
  build:
    executor:
      name: hmpps/node
      tag: << pipeline.parameters.node-version >>
    steps:
      - checkout
      - run:
          name: Update npm
          command: 'sudo npm install -g npm@11'
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install Dependencies
          command: npm run setup
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
            - ~/.cache
      - run:
          name: Typecheck
          command: npm run typecheck
      - run:
          name: Build
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - dist
            - assets/stylesheets
            - .cache/Cypress
  integration_test:
    executor: integration-tests
    environment:
      DB_SSL_ENABLED: false
      ENABLE_TEST_UTILS: true
      NOMIS_API_URL: http://localhost:8080/prisonApi
      NOMIS_AUTH_URL: http://hmpps-auth:9090/auth
      DELIUS_API_URL: http://localhost:8080/delius
      PROBATION_TEAMS_API_URL: http://localhost:8080/probationteams
      TOKENVERIFICATION_API_ENABLED: false
      GOTENBERG_API_URL: http://localhost:3001
      HDC_URL: http://localhost:3000
      COM_NOT_ALLOCATED_BLOCK_ENABLED: false
    steps:
      - checkout
      - attach_workspace:
          at: ~/app
      - run:
          name: Run the mock server.
          command: npm run start-mocks
          background: true
      - run:
          name: Run the node app.
          command: npm start
          background: true
      - run:
          name: Wait for node app to start
          command: sleep 5
      - run:
          name: Seed db
          command: npm run db:seed
      - restore_cache:
          key: gradle-wrapper-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}
      - restore_cache:
          key: gradle-cache-{{ checksum "licences-specs/build.gradle" }}
      - browser-tools/install-chrome
      - browser-tools/install-chromedriver
      - run:
          name: Run Integration Tests
          command: ./gradlew mockTest --info
      - save_cache:
          key: gradle-wrapper-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}
          paths:
            - /home/circleci/.gradle/wrapper
      - save_cache:
          key: gradle-cache-{{ checksum "licences-specs/build.gradle" }}
          paths:
            - /home/circleci/.gradle/caches
      - store_artifacts:
          path: licences-specs/build/reports
          destination: integration/spock
      - store_artifacts:
          path: licences-specs/build/geb-reports
          destination: integration/geb
      - store_test_results:
          path: licences-specs/build/test-results
workflows:
  version: 2
  build-test-and-deploy:
    jobs:
      - build:
        filters:
          tags:
            ignore: /.*/
      - integration_test:
          requires:
            - build
