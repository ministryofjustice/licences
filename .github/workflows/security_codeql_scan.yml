name: Security CodeQL actions scan

on:
  workflow_dispatch:
  schedule:
    - cron: "27 6 * * MON-FRI" # Every weekday

jobs:
  security-codeql-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL actions scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql.yml@v2 # WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      languages: javascript-typescript
    secrets: inherit
